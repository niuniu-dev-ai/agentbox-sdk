[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "niuniu-agentbox"
version = "0.1.7"
description = "Python SDK for AgentBox private agent state and scoped sharing."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "AgentBox" }]
dependencies = []
keywords = ["agentbox", "agents", "sdk", "a2a", "agent-memory"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Typing :: Typed"
]

[project.urls]
Homepage = "https://agentbox.niuniu.dev/"
Source = "https://github.com/niuniu-dev-ai/agentbox-sdk"
Documentation = "https://github.com/niuniu-dev-ai/agentbox-sdk#readme"
Issues = "https://github.com/niuniu-dev-ai/agentbox-sdk/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/agentbox"]
