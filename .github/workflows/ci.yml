name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci
      - run: npm run typecheck
      - run: npm run release:check:sdk-js
      - run: npm run test:sdk-python
      - run: python3 -m pip install --upgrade pip build
      - run: npm run release:check:sdk-python
