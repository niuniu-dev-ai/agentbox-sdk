name: Publish SDK

on:
  workflow_dispatch:
    inputs:
      publish_js:
        description: Publish @niuniu-ai/agentbox to npm
        required: true
        type: boolean
        default: true
      publish_python:
        description: Publish niuniu-agentbox to PyPI
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify SDK packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: JavaScript SDK release check
        run: npm run release:check:sdk-js

      - name: Python SDK tests
        run: npm run test:sdk-python

      - name: Python SDK release check
        run: npm run release:check:sdk-python

  publish-js:
    name: Publish JavaScript SDK
    needs: verify
    if: ${{ inputs.publish_js && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Use npm with trusted publishing support
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build JavaScript SDK
        run: npm run build --workspace @niuniu-ai/agentbox

      - name: Publish to npm
        working-directory: packages/sdk-js
        run: npm publish --access public

  publish-python:
    name: Publish Python SDK
    needs: verify
    if: ${{ inputs.publish_python && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Python SDK
        run: |
          python -m pip install --upgrade build
          python -m build packages/sdk-python --outdir dist/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/python
