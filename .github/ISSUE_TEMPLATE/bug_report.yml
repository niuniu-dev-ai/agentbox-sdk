name: SDK bug report
description: Report a bug in the public TypeScript or Python SDK.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@niuniu-ai/agentbox"
        - "niuniu-agentbox"
        - "Documentation"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.6"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Do not include live tokens or secrets.
    validations:
      required: true
